model:
  type: llama
  name: LLaMA-350M
  hidden_size: 1024
  num_hidden_layers: 24
  num_attention_heads: 16
  num_key_value_heads: 16
  intermediate_size: 2816
  max_position_embeddings: 2048
  vocab_size: 50304
  rms_norm_eps: 1.0e-5
  rope_theta: 10000.0

training:
  batch_size: 4
  grad_accum: 2
  max_steps: 20000
  lr: 1e-3
  warmup_steps: 500
  weight_decay: 0.01
  grad_clip: 1.0
  bf16: true
  attn_impl: sdpa
  log_freq: 50
  save_every: 5000
  # NOTE: 350M LLaMA may not fit on 2080 Ti (11GB).
  # Use smaller batch_size or gradient accumulation.

optimizer:
  name: adaptive_rank_muon
  momentum: 0.9
  rms_scale: 0.04
  rho0: 0.15
  rho_min: 0.0625
  rho_max: 0.6
  xi_thresh: 0.15
  delta_rho: 0.005
  beta3: 0.9
  adapt_freq: 10
  ns_iters: 5

data:
  path: /media/nas_mount/ramish/btp_report/owt_pythia_packed_2048
  seq_len: 2048
  num_workers: 0

output:
  save_dir: results/LLaMA-350M_{optimizer.name}
